name: Time-Series Engine CI (CERN-Standard)

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  # ------------------------------------------------------------------
  # JOB 0: Formatting & Static Analysis
  # ------------------------------------------------------------------
  quality-gate:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Enforce Formatting (Pre-commit)
        run: |
          pip install pre-commit
          pre-commit run --all-files

      - name: Install CppCheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run CppCheck (C++ Logic)
        run: >
          cppcheck
          --enable=warning,style,performance,portability
          --error-exitcode=1
          --suppress=missingInclude
          -I ./engine
          ./engine

  # ------------------------------------------------------------------
  # JOB 1: C++ Core Verification (Build, Test, Valgrind)
  # ------------------------------------------------------------------
  cpp-core:
    runs-on: ubuntu-22.04
    needs: quality-gate # Wait for formatting to pass
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ valgrind

      - name: Configure and Build
        run: |
          cmake -S engine -B build
          cmake --build build

      - name: Run C++ Unit Tests (GTest)
        run: ./build/engine_test

      - name: Memory Safety Check (Valgrind)
        run: |
          valgrind --leak-check=full --error-exitcode=1 ./build/engine_test

  # ------------------------------------------------------------------
  # JOB 2: Python Integration & API Tests
  # ------------------------------------------------------------------
  python-integration:
    runs-on: ubuntu-22.04
    needs: cpp-core
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Shared Library for Python
        run: |
          sudo apt-get install -y cmake
          cmake -S engine -B build
          cmake --build build
          sudo cp build/libinsight.so /usr/local/lib/
          sudo ldconfig

      - name: Run Pytest
        run: |
          PYTHONPATH=. pytest tests/test_api.py

  # ------------------------------------------------------------------
  # JOB 3: Docker Production Build
  # ------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: python-integration
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build . --file Dockerfile --tag telemetry-engine:latest
