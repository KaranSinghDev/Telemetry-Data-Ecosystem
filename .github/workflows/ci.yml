name: CI Pipeline (CERN-Standard)

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  # ------------------------------------------------------------------
  # JOB 1: C++ Core Verification (Build, Test, Memory Safety)
  # ------------------------------------------------------------------
  cpp-core:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ valgrind

      - name: Configure CMake
        # We build in a specific 'build' directory
        run: cmake -S engine -B build

      - name: Build Engine & Tests
        # Builds both the library and the 'engine_test' executable
        run: cmake --build build

      - name: Run C++ Unit Tests (GTest)
        # If this fails, your logic is wrong
        run: ./build/engine_test

      - name: Memory Safety Check (Valgrind)
        # This runs the tests AGAIN inside Valgrind.
        # --error-exitcode=1 means "Fail the build if leaks are found"
        # --leak-check=full is the rigorous standard
        run: |
          valgrind --leak-check=full --error-exitcode=1 ./build/engine_test

  # ------------------------------------------------------------------
  # JOB 2: Python Integration & API Tests
  # ------------------------------------------------------------------
  python-integration:
    runs-on: ubuntu-22.04
    needs: cpp-core # Only run if C++ core is safe
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # We need ctypes to load the .so, but for this test, we might mock it
          # OR we need to build the .so first. Let's build it.
      
      - name: Build Shared Library for Python
        run: |
          sudo apt-get install -y cmake
          cmake -S engine -B build
          cmake --build build
          # Move the .so to where Python expects it (simulating ldconfig)
          sudo cp build/libinsight.so /usr/local/lib/
          sudo ldconfig

      - name: Run Pytest
        run: |
          # We define the python path to include the root directory
          PYTHONPATH=. pytest tests/test_api.py

  # ------------------------------------------------------------------
  # JOB 3: Docker Production Build
  # ------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: python-integration # Only build if tests pass
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build . --file Dockerfile --tag telemetry-engine:latest
