repos:
  # 1. Standard Sanity Checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  # 2. C++ Formatting (Regex approach to bypass system tags bug)
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v17.0.6
    hooks:
      - id: clang-format
        # Use files regex instead of types
        files: \.(cpp|h|hpp|c)$
        args: ['-style=LLVM', '-i']

  # 3. Python Auto-Formatter
  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        files: \.py$

  # 4. Python Linter
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        files: \.py$
        args: ['--max-line-length=88', '--extend-ignore=E203,E201,E202,W503']




             